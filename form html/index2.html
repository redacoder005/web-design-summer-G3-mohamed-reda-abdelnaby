<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Register Form</legend>
            <label>firstName</label>
            <input maxlength="5" type="text" name="firstName" pattern="[A-Za-z]+">
            <label>email</label>
            <input type="email" name="email" required pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">
            <label>phone</label>
            <input type="text" maxlength="11" name="phone" pattern="01[0125][0-9]{8}">


            <input type="text" id="course" name="course" list="courses" placeholder="Choose a course">

            <datalist id="courses">
    <option value="HTML">
    <option value="CSS">
    <option value="JavaScript">
    <option value="PHP">
    <option value="Python">
</datalist><br>
            <input type="file" name="image" accept=".png" required>
            <input type="date" required name="date"><br>
            <input type="text" name="comment" required placeholder="leave a comment"><br>
            <input type="range" name="range" min="100 " max="200 "><br>

            <label>gender</label>
            <input type="radio" name="gender" value="male" checked>
            <label>male</label>
            <input type="radio" name="gender" value="female">
            <label>female</label><br>
            <label>tracks</label>
            <input type="checkbox" name="tracks" value="html">
            <label>html</label>
            <input type="checkbox" name="tracks" value="css">
            <label>css</label>
            <input type="checkbox" name="tracks" value="java">
            <label>java</label><br>
            <input type="submit">
            <input type="reset">

        </fieldset>
    </form>
</body>

</html>
